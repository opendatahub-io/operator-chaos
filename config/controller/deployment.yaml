apiVersion: apps/v1
kind: Deployment
metadata:
  name: odh-chaos-controller
  labels:
    app.kubernetes.io/name: odh-chaos-controller
    app.kubernetes.io/part-of: odh-platform-chaos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odh-chaos-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odh-chaos-controller
        app.kubernetes.io/part-of: odh-platform-chaos
    spec:
      serviceAccountName: odh-chaos-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: quay.io/opendatahub/odh-chaos:latest
          args:
            - controller
            - start
            - --namespace=$(WATCH_NAMESPACE)
            - --metrics-addr=:8080
            - --health-addr=:8081
            - --leader-elect=true
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
