apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-chaos-controller
rules:
  # ChaosExperiment CRD
  - apiGroups: ["chaos.operatorchaos.io"]
    resources: ["chaosexperiments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["chaos.operatorchaos.io"]
    resources: ["chaosexperiments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["chaos.operatorchaos.io"]
    resources: ["chaosexperiments/finalizers"]
    verbs: ["update"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  # Pod injection (PodKill)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  # ConfigDrift injection + NamespaceDeletion rollback ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Namespace lifecycle (NamespaceDeletion injection needs create/delete)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # ServiceAccount and Service read (Services listed by NamespaceDeletion for resource counting)
  - apiGroups: [""]
    resources: ["serviceaccounts", "services"]
    verbs: ["get", "list", "watch"]
  # Deployment/ReplicaSet/StatefulSet manipulation
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # NetworkPartition injection
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  # RBACRevoke injection (watch needed for controller-runtime cache, create/delete for binding lifecycle)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # WebhookDisrupt injection (watch needed for controller-runtime cache)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "update", "patch"]
