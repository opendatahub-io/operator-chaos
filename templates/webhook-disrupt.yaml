# requires: namespace, deployment, webhook_name, webhook_type, webhook_resource_kind
apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: ${COMPONENT}-webhook-disrupt
spec:
  tier: 4
  target:
    operator: ${OPERATOR}
    component: ${COMPONENT_NAME}
    resource: ${WEBHOOK_RESOURCE_KIND}/${WEBHOOK_NAME}
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: ${DEPLOYMENT}
        namespace: ${NAMESPACE}
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      webhookName: ${WEBHOOK_NAME}
      webhookType: ${WEBHOOK_TYPE}
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      When the ${COMPONENT} webhook failurePolicy is weakened from Fail to
      Ignore, invalid resources may bypass admission validation. The chaos
      framework restores the original failurePolicy via TTL-based cleanup.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - ${NAMESPACE}
