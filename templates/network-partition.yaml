# requires: namespace, deployment, label_selector
apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: ${COMPONENT}-network-partition
spec:
  tier: 2
  target:
    operator: ${COMPONENT}
    component: ${COMPONENT_NAME}
    resource: Deployment/${DEPLOYMENT}
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: ${DEPLOYMENT}
        namespace: ${NAMESPACE}
        conditionType: Available
    timeout: "30s"
  injection:
    type: NetworkPartition
    parameters:
      labelSelector: ${LABEL_SELECTOR}
    ttl: "60s"
  hypothesis:
    description: >-
      When ${COMPONENT} pods are network-isolated via a deny-all NetworkPolicy,
      the component should detect the partition and recover once connectivity
      is restored.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - ${NAMESPACE}
