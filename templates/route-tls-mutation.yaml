# requires: namespace, deployment, route_name, route_namespace
# platform: openshift
apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: ${COMPONENT}-route-tls-mutation
spec:
  tier: 3
  target:
    operator: ${COMPONENT}
    component: ${COMPONENT_NAME}
    resource: Route/${ROUTE_NAME}
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: ${DEPLOYMENT}
        namespace: ${NAMESPACE}
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: ${ROUTE_NAME}
      namespace: ${ROUTE_NAMESPACE}
      path: "spec.tls.termination"
      value: "passthrough"
    ttl: "60s"
  hypothesis:
    description: >-
      When the ${COMPONENT} route TLS termination is mutated, HTTPS traffic
      handling changes. The chaos framework restores the original TLS
      configuration via TTL-based cleanup.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - ${NAMESPACE}
      - ${ROUTE_NAMESPACE}
