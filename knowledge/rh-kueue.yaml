operator:
  name: kueue-operator
  namespace: openshift-kueue-operator
  repository: https://github.com/openshift/kueue-operator

components:
  - name: kueue-operator
    controller: OLM
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: openshift-kueue-operator
        namespace: openshift-kueue-operator
        labels:
          name: openshift-kueue-operator
        expectedSpec:
          replicas: 2
      - apiVersion: v1
        kind: ServiceAccount
        name: openshift-kueue-operator
        namespace: openshift-kueue-operator
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: openshift-kueue-operator-lock
        namespace: openshift-kueue-operator
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: openshift-kueue-operator
          namespace: openshift-kueue-operator
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
