operator:
  name: service-mesh
  namespace: openshift-operators
  repository: https://github.com/openshift-service-mesh/sail-operator

components:
  - name: servicemesh-operator3
    controller: OLM
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: servicemesh-operator3
        namespace: openshift-operators
        labels:
          control-plane: servicemesh-operator3
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: servicemesh-operator3
        namespace: openshift-operators
      - apiVersion: v1
        kind: Service
        name: servicemesh-operator3-metrics-service
        namespace: openshift-operators
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: sail-operator-lock
        namespace: openshift-operators
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: servicemesh-operator3
          namespace: openshift-operators
          conditionType: Available
      timeout: "60s"

  - name: istiod
    controller: servicemesh-operator3
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: istiod-openshift-gateway
        namespace: openshift-ingress
        labels:
          app: istiod
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: istiod-openshift-gateway
        namespace: openshift-ingress
      - apiVersion: v1
        kind: Service
        name: istiod-openshift-gateway
        namespace: openshift-ingress
      - apiVersion: sailoperator.io/v1
        kind: Istio
        name: openshift-gateway
        namespace: openshift-ingress
    webhooks:
      - name: istio-validator-openshift-gateway-openshift-ingress
        type: validating
        path: /validate
      - name: istio-sidecar-injector-openshift-gateway-openshift-ingress
        type: mutating
        path: /inject
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: istiod-openshift-gateway
          namespace: openshift-ingress
          conditionType: Available
        - type: conditionTrue
          apiVersion: sailoperator.io/v1
          kind: Istio
          name: openshift-gateway
          namespace: openshift-ingress
          conditionType: Ready
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
