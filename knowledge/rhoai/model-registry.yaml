operator:
  name: model-registry
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/model-registry-operator

components:
  - name: model-registry-operator
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: model-registry-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          control-plane: model-registry-operator
          app.kubernetes.io/name: deployment
          app.kubernetes.io/part-of: model-registry-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: model-registry-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: model-registry-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: 85f368d1.opendatahub.io
        namespace: redhat-ods-applications
      - apiVersion: route.openshift.io/v1
        kind: Route
        name: model-catalog-https
        namespace: rhoai-model-registries
    webhooks:
      - name: model-registry-operator-validating-webhook-configuration
        type: validating
        path: /validate-modelregistry-opendatahub-io-modelregistry
      - name: model-registry-operator-mutating-webhook-configuration
        type: mutating
        path: /mutate-modelregistry-opendatahub-io-modelregistry
    finalizers:
      - modelregistry.opendatahub.io/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: model-registry-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
