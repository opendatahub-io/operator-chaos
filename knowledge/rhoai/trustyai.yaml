operator:
  name: trustyai
  namespace: redhat-ods-applications
  repository: https://github.com/trustyai-explainability/trustyai-service-operator

components:
  - name: trustyai-service-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: trustyai-service-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/part-of: trustyai
          control-plane: controller-manager
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: trustyai-service-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: trustyai-service-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: b7e9931f.trustyai.opendatahub.io
        namespace: redhat-ods-applications
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: trustyai-service-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
