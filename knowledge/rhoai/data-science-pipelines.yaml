operator:
  name: data-science-pipelines
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/data-science-pipelines-operator

components:
  - name: data-science-pipelines-operator
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: data-science-pipelines-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/name: data-science-pipelines-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ConfigMap
        name: data-science-pipelines-operator-dspo-config
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: ServiceAccount
        name: data-science-pipelines-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: data-science-pipelines-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: f9eb95d5.opendatahub.io
        namespace: redhat-ods-applications
    finalizers:
      - datasciencepipelinesapplications.opendatahub.io/finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: data-science-pipelines-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
