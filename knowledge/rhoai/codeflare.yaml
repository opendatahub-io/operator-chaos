operator:
  name: codeflare
  namespace: redhat-ods-applications
  repository: https://github.com/project-codeflare/codeflare-operator

components:
  - name: codeflare-operator-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: codeflare-operator-manager
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/name: codeflare-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: codeflare-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: codeflare-operator-manager-rolebinding
    webhooks:
      - name: vappwrapper.kb.io
        type: validating
        path: /validate-workload-codeflare-dev-v1beta2-appwrapper
      - name: mappwrapper.kb.io
        type: mutating
        path: /mutate-workload-codeflare-dev-v1beta2-appwrapper
      - name: vraycluster.ray.openshift.ai
        type: validating
        path: /validate-ray-io-v1-raycluster
      - name: mraycluster.ray.openshift.ai
        type: mutating
        path: /mutate-ray-io-v1-raycluster
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: codeflare-operator-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
