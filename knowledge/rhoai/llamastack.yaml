operator:
  name: llamastack
  namespace: redhat-ods-applications
  repository: https://github.com/meta-llama/llama-stack-k8s-operator

components:
  - name: llama-stack-k8s-operator-controller-manager
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: llama-stack-k8s-operator-controller-manager
        namespace: redhat-ods-applications
        labels:
          control-plane: controller-manager
          app.kubernetes.io/name: llama-stack-k8s-operator
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: llama-stack-k8s-operator-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: llama-stack-k8s-operator-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: 54e06e98.llamastack.io
        namespace: redhat-ods-applications
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: llama-stack-k8s-operator-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
