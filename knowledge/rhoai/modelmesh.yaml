operator:
  name: modelmesh
  namespace: redhat-ods-applications
  repository: https://github.com/kserve/modelmesh-serving

components:
  - name: modelmesh-controller
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: modelmesh-controller
        namespace: redhat-ods-applications
        labels:
          app.kubernetes.io/name: modelmesh-controller
        expectedSpec:
          replicas: 3
      - apiVersion: apps/v1
        kind: Deployment
        name: etcd
        namespace: redhat-ods-applications
        labels:
          component: model-mesh-etcd
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ServiceAccount
        name: modelmesh-controller
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: modelmesh-controller-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: modelmesh-controller-leader-lock
        namespace: redhat-ods-applications
    webhooks:
      - name: servingruntime.modelmesh-webhook-server.default
        type: validating
        path: /validate-serving-modelmesh-io-v1alpha1-servingruntime
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: modelmesh-controller
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
