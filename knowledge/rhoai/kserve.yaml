operator:
  name: kserve
  namespace: redhat-ods-applications
  repository: https://github.com/kserve/kserve

components:
  - name: kserve-controller-manager
    controller: KServe
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: kserve-controller-manager
        namespace: redhat-ods-applications
        labels:
          control-plane: kserve-controller-manager
          app.kubernetes.io/name: kserve-controller-manager
          app.kubernetes.io/part-of: kserve
          controller-tools.k8s.io: "1.0"
        expectedSpec:
          replicas: 1
      - apiVersion: v1
        kind: ConfigMap
        name: kserve-parameters
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: ServiceAccount
        name: kserve-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Secret
        name: kserve-webhook-server-cert
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: kserve-manager-rolebinding
      - apiVersion: coordination.k8s.io/v1
        kind: Lease
        name: kserve-controller-manager-leader-lock
        namespace: redhat-ods-applications
    webhooks:
      - name: inferenceservice.serving.kserve.io
        type: mutating
        path: /mutate-serving-kserve-io-v1beta1-inferenceservice
      - name: inferenceservice.serving.kserve.io
        type: validating
        path: /validate-serving-kserve-io-v1beta1-inferenceservice
      - name: inferencegraph.serving.kserve.io
        type: validating
        path: /validate-serving-kserve-io-v1alpha1-inferencegraph
      - name: trainedmodel.serving.kserve.io
        type: validating
        path: /validate-serving-kserve-io-v1alpha1-trainedmodel
      - name: servingruntime.serving.kserve.io
        type: validating
        path: /validate-serving-kserve-io-v1alpha1-servingruntime
    finalizers:
      - inferenceservice.finalizers
      - trainedmodel.finalizer
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: kserve-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
