site_name: Operator Chaos
site_url: https://opendatahub-io.github.io/operator-chaos
repo_url: https://github.com/opendatahub-io/operator-chaos
repo_name: opendatahub-io/operator-chaos
edit_uri: edit/main/site/docs/
copyright: Copyright &copy; Red Hat, Inc.

theme:
  name: material
  language: en
  favicon: images/favicon-32.png
  logo: images/logo.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Red Hat Text
    code: Red Hat Mono
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.tabs.sticky
    - navigation.path
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - glightbox:
      touchNavigation: true
      zoomable: true
      draggable: true
      effect: zoom
      width: "100%"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/diagram-zoom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

