apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: training-operator-deployment-scale-zero
spec:
  tier: 3
  target:
    operator: training-operator
    component: training-operator-controller-manager
    resource: Deployment/kubeflow-training-operator
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: DeploymentScaleZero
    dangerLevel: high
    parameters:
      name: kubeflow-training-operator
    ttl: "300s"
  hypothesis:
    description: >-
      Scaling the deployment to zero replicas removes all operator pods.
      Tests whether the platform detects the unavailable deployment and
      restores it. Without the operator, no reconciliation occurs but
      existing operands continue running.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
