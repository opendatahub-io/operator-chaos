apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: training-operator-pdb-block
spec:
  tier: 2
  target:
    operator: training-operator
    component: training-operator-controller-manager
    resource: Deployment/kubeflow-training-operator
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: PDBBlock
    dangerLevel: high
    parameters:
      labelSelector: control-plane=kubeflow-training-operator
    ttl: "10s"
  hypothesis:
    description: >-
      Creating a PDB with maxUnavailable=0 blocks all voluntary
      evictions. Tests whether the operator's pods can be drained
      for node maintenance or cluster upgrades.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
