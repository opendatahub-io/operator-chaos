apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: opendatahub-operator-webhook-disrupt
spec:
  tier: 4
  target:
    operator: opendatahub-operator
    component: opendatahub-operator
    resource: ValidatingWebhookConfiguration/validating.datasciencecluster.opendatahub.io
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: opendatahub-operator-controller-manager
        namespace: opendatahub-operator-system
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      # NOTE: The ValidatingWebhookConfiguration object name is deployment-specific
      # (e.g. "datasciencecluster-v1-validator.opendatahub.io-76l4f" with an auto-generated suffix).
      # This value must be updated to match the actual object name on your cluster.
      # Run: kubectl get validatingwebhookconfiguration | grep datasciencecluster
      webhookName: validating.datasciencecluster.opendatahub.io
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      When the validating webhook failurePolicy is weakened from Fail to
      Ignore, invalid DataScienceCluster and DSCInitialization resources
      can bypass admission validation. The chaos framework restores the
      original failurePolicy via TTL-based cleanup after 60s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 3
    allowDangerous: true
