apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: feast-deployment-scale-zero
spec:
  tier: 3
  target:
    operator: feast
    component: feast-operator-controller-manager
    resource: Deployment/feast-operator-controller-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: feast-operator-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: DeploymentScaleZero
    dangerLevel: high
    parameters:
      name: feast-operator-controller-manager
    ttl: "300s"
  hypothesis:
    description: >-
      Scaling the deployment to zero replicas removes all operator pods.
      Tests whether the platform detects the unavailable deployment and
      restores it. Without the operator, no reconciliation occurs but
      existing operands continue running.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
