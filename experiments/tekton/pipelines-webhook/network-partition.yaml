apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-webhook-network-partition
spec:
  tier: 2
  target:
    operator: tekton
    component: pipelines-webhook
    resource: Deployment/tekton-pipelines-webhook
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-webhook
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: NetworkPartition
    parameters:
      labelSelector: app.kubernetes.io/component=webhook,app.kubernetes.io/part-of=tekton-pipelines
      direction: ingress
    ttl: "120s"
  hypothesis:
    description: >-
      Isolating the Tekton webhook from the network should prevent
      the API server from reaching it for admission validation.
      Pipeline and task creation requests will timeout or fail.
      After the partition is lifted, the webhook should reconnect
      and resume validating admission requests.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
