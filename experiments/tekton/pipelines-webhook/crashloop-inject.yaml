apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-webhook-crashloop-inject
spec:
  tier: 3
  target:
    operator: tekton
    component: pipelines-webhook
    resource: Deployment/tekton-pipelines-webhook
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-webhook
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: CrashLoopInject
    dangerLevel: high
    parameters:
      name: tekton-pipelines-webhook
    ttl: "300s"
  hypothesis:
    description: >-
      Replacing the container command with a nonexistent binary causes
      CrashLoopBackOff. Tests whether the Pipelines operator detects
      the degraded deployment and takes corrective action to restore
      the webhook.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
