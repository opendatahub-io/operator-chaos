apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-pdb-block
spec:
  tier: 2
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: PDBBlock
    dangerLevel: high
    parameters:
      labelSelector: app.kubernetes.io/component=controller,app.kubernetes.io/part-of=tekton-pipelines
    ttl: "10s"
  hypothesis:
    description: >-
      Creating a PDB with maxUnavailable=0 blocks all voluntary
      evictions. Tests whether the Tekton controller pods can be
      drained for node maintenance or cluster upgrades.
    recoveryTimeout: 60s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
