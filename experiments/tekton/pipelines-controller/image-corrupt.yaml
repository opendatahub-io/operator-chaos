apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-image-corrupt
spec:
  tier: 3
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: ImageCorrupt
    dangerLevel: high
    parameters:
      name: tekton-pipelines-controller
    ttl: "300s"
  hypothesis:
    description: >-
      Patching the container image to an invalid registry causes
      ImagePullBackOff. Tests whether the Pipelines operator detects
      the stuck rollout and takes corrective action to restore the
      controller.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
