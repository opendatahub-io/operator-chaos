apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-deployment-scale-zero
spec:
  tier: 3
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: DeploymentScaleZero
    dangerLevel: high
    parameters:
      name: tekton-pipelines-controller
    ttl: "300s"
  hypothesis:
    description: >-
      Scaling the deployment to zero replicas removes all controller
      pods. Tests whether the Pipelines operator detects the unavailable
      deployment and restores it. Without the controller, no PipelineRun
      or TaskRun reconciliation occurs but running task pods continue.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
