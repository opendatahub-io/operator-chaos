apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-leader-election-disrupt
spec:
  tier: 3
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: LeaderElectionDisrupt
    dangerLevel: high
    parameters:
      name: tekton-pipelines-controller.github.com.tektoncd.pipeline.pkg.reconciler.pipelinerun.reconciler.00-of-01
    ttl: "120s"
  hypothesis:
    description: >-
      Disrupting the leader election lease forces a re-election cycle.
      Tests whether the Tekton controller detects the lost lease and
      re-acquires leadership, resuming PipelineRun reconciliation
      within the recovery timeout.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
