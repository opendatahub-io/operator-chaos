apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-network-partition
spec:
  tier: 2
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: NetworkPartition
    parameters:
      labelSelector: app.kubernetes.io/component=controller,app.kubernetes.io/part-of=tekton-pipelines
      direction: ingress
    ttl: "120s"
  hypothesis:
    description: >-
      Isolating the Tekton pipelines controller from the API server
      should cause pipeline reconciliation to stall. Running task pods
      continue executing independently. After the partition is lifted,
      the controller should reconnect and process any backlogged
      PipelineRun and TaskRun submissions.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
