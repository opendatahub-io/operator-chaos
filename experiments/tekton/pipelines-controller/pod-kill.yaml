apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: tekton-pipelines-controller-pod-kill
spec:
  tier: 1
  target:
    operator: tekton
    component: pipelines-controller
    resource: Deployment/tekton-pipelines-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: tekton-pipelines-controller
        namespace: openshift-pipelines
        conditionType: Available
    timeout: "30s"
  injection:
    type: PodKill
    parameters:
      labelSelector: app.kubernetes.io/component=controller,app.kubernetes.io/part-of=tekton-pipelines
    count: 1
    ttl: "300s"
  hypothesis:
    description: >-
      Killing the Tekton pipelines controller pod should trigger a
      Deployment rollout that recreates it. Running PipelineRuns and
      TaskRuns continue executing since the pods are independent.
      New pipeline submissions and reconciliation stall until recovery.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-pipelines
