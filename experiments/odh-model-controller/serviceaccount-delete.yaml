apiVersion: chaos.opendatahub.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: odh-model-controller-serviceaccount-delete
spec:
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: ServiceAccount/odh-model-controller
  steadyState:
    checks:
      - type: resourceExists
        apiVersion: v1
        kind: ServiceAccount
        name: odh-model-controller
        namespace: opendatahub
    timeout: "30s"
  injection:
    type: FinalizerBlock
    dangerLevel: high
    parameters:
      apiVersion: "v1"
      kind: "ServiceAccount"
      name: "odh-model-controller"
    ttl: "120s"
  hypothesis:
    description: >-
      Operator detects stuck ServiceAccount in Terminating state and
      recovers within 120s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - opendatahub
    allowDangerous: true
