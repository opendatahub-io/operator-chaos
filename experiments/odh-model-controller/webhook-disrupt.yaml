apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: odh-model-controller-webhook-disrupt
spec:
  tier: 4
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: MutatingWebhookConfiguration/mutating.odh-model-controller.opendatahub.io
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: odh-model-controller
        namespace: opendatahub
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      webhookName: mutating.odh-model-controller.opendatahub.io
      webhookType: mutating
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      When the mutating webhook failurePolicy is weakened from Fail to
      Ignore, resources can bypass mutation (e.g. pod injection,
      InferenceService defaulting). The chaos framework restores the
      original failurePolicy via TTL-based cleanup after 60s. During the
      disruption window, the controller itself remains operational but
      admission guardrails are absent.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
