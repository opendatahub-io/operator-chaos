apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: strimzi-cluster-operator-label-stomping
spec:
  tier: 3
  target:
    operator: strimzi
    component: cluster-operator
    resource: Deployment/amq-streams-cluster-operator-v3.2.0-8
  steadyState:
    checks:
      - type: resourceExists
        apiVersion: apps/v1
        kind: Deployment
        name: amq-streams-cluster-operator-v3.2.0-8
        namespace: openshift-operators
    timeout: "30s"
  injection:
    type: LabelStomping
    dangerLevel: high
    parameters:
      apiVersion: apps/v1
      kind: Deployment
      name: amq-streams-cluster-operator-v3.2.0-8
      labelKey: name
      action: overwrite
    ttl: "300s"
  hypothesis:
    description: >-
      When a label used for resource discovery is overwritten on the
      cluster operator Deployment, OLM should detect the label drift
      and restore the correct label value.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-operators
