apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: strimzi-cluster-operator-pod-kill
spec:
  tier: 1
  target:
    operator: strimzi
    component: cluster-operator
    resource: Deployment/amq-streams-cluster-operator-v3.2.0-8
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: amq-streams-cluster-operator-v3.2.0-8
        namespace: openshift-operators
        conditionType: Available
    timeout: "30s"
  injection:
    type: PodKill
    parameters:
      labelSelector: name=amq-streams-cluster-operator
    count: 1
    ttl: "300s"
  hypothesis:
    description: >-
      Killing the Strimzi cluster operator pod should trigger a Deployment
      rollout that recreates it. Existing Kafka clusters continue running
      independently since they are managed by their own StatefulSets.
      Pending Kafka CR reconciliation will stall until the operator recovers.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-operators
