apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: cert-manager-pdb-block
spec:
  tier: 2
  target:
    operator: cert-manager
    component: cert-manager
    resource: Deployment/cert-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: cert-manager
        namespace: cert-manager
        conditionType: Available
    timeout: "30s"
  injection:
    type: PDBBlock
    dangerLevel: high
    parameters:
      labelSelector: app.kubernetes.io/name=cert-manager
    ttl: "10s"
  hypothesis:
    description: >-
      Creating a PDB with maxUnavailable=0 blocks all voluntary
      evictions. Tests whether the operator's pods can be drained
      for node maintenance or cluster upgrades.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - cert-manager
