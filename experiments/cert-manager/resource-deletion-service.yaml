apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: cert-manager-resource-deletion-service
spec:
  tier: 3
  target:
    operator: cert-manager
    component: cert-manager
    resource: Deployment/cert-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: cert-manager
        namespace: cert-manager
        conditionType: Available
    timeout: "30s"
  injection:
    type: ResourceDeletion
    dangerLevel: high
    parameters:
      apiVersion: v1
      kind: Service
      name: cert-manager
    ttl: "300s"
  hypothesis:
    description: >-
      Deleting the metrics/webhook Service tests whether the operator
      recreates it during reconciliation. Without the Service,
      metrics scraping and webhook calls fail.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - cert-manager
