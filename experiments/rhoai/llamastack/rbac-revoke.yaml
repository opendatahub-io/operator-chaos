apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: llamastack-rbac-revoke
spec:
  tier: 3
  target:
    operator: llamastack
    component: llama-stack-k8s-operator-controller-manager
    resource: ClusterRoleBinding/llama-stack-k8s-operator-manager-rolebinding
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: llama-stack-k8s-operator-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: RBACRevoke
    dangerLevel: high
    parameters:
      bindingName: llama-stack-k8s-operator-manager-rolebinding
      bindingType: ClusterRoleBinding
    ttl: "120s"
  hypothesis:
    description: >-
      When the llama-stack-k8s-operator ClusterRoleBinding is revoked,
      the operator loses permissions to manage LlamaStack resources.
      After the binding is restored via TTL cleanup, the operator
      should resume normal reconciliation.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
