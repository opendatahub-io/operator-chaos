apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: llamastack-pod-kill
spec:
  tier: 1
  target:
    operator: llamastack
    component: llama-stack-k8s-operator-controller-manager
    resource: Deployment/llama-stack-k8s-operator-controller-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: llama-stack-k8s-operator-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: PodKill
    parameters:
      labelSelector: control-plane=controller-manager,app.kubernetes.io/name=llama-stack-k8s-operator
    count: 1
    ttl: "300s"
  hypothesis:
    description: >-
      When the llama-stack-k8s-operator pod is killed, the Deployment
      controller should restart it and the operator should resume
      reconciliation of LlamaStack resources.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
