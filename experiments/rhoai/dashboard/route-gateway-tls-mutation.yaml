apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-gateway-tls-mutation
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/data-science-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "data-science-gateway"
      path: "spec.tls.termination"
      value: "passthrough"
    ttl: "300s"
  hypothesis:
    description: >-
      Changing the data-science-gateway Route TLS termination from
      reencrypt to passthrough forces the router to stop terminating
      TLS and forward encrypted traffic directly to the Gateway. Since
      the Gateway expects reencrypt, this breaks HTTPS access. The
      GatewayConfig controller should detect the TLS drift and restore
      the correct termination mode.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - openshift-ingress
    allowDangerous: true
