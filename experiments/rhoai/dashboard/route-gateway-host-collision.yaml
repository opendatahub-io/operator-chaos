apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-gateway-host-collision
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/data-science-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "data-science-gateway"
      path: "spec.host"
      value: "chaos-collision.apps.cluster.invalid"
    ttl: "300s"
  hypothesis:
    description: >-
      Mutating the data-science-gateway Route host to a non-matching
      domain makes the shared RHOAI ingress unreachable. The router
      re-evaluates admission and may reject the Route. The GatewayConfig
      controller should detect the host drift and restore the correct
      value.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - openshift-ingress
    allowDangerous: true
