apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-gateway-shard-mismatch
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/data-science-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "data-science-gateway"
      path: "spec.host"
      value: "gateway.nonexistent-shard.local"
    ttl: "300s"
  hypothesis:
    description: >-
      Setting the data-science-gateway Route host to a domain that does
      not match any configured IngressController simulates a router
      shard misconfiguration. No IngressController will claim the Route,
      making all RHOAI components unreachable. The GatewayConfig
      controller should detect the drift and restore the original host.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - openshift-ingress
    allowDangerous: true
