apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-gateway-parentref-mismatch
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: HTTPRoute/rhods-dashboard
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "gateway.networking.k8s.io/v1"
      kind: "HTTPRoute"
      name: "rhods-dashboard"
      path: "spec.parentRefs"
      value: '[{"name":"chaos-nonexistent-gateway","namespace":"openshift-ingress"}]'
    ttl: "300s"
  hypothesis:
    description: >-
      Changing the HTTPRoute parentRef to a non-existent Gateway orphans
      the route from its ingress path. This is the Gateway API equivalent
      of route-shard-mismatch on standard OCP. No Gateway will claim the
      HTTPRoute, making the dashboard unreachable. The RHOAI operator
      should detect the parentRef drift and restore the reference to
      data-science-gateway.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
