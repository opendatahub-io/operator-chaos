apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-dashboard-route-gateway-backend-disruption
spec:
  tier: 3
  target:
    operator: dashboard
    component: rhods-dashboard
    resource: Route/data-science-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: rhods-dashboard
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "data-science-gateway"
      path: "spec.to.name"
      value: "chaos-nonexistent-service"
    ttl: "300s"
  hypothesis:
    description: >-
      Changing the data-science-gateway Route backend to a non-existent
      service breaks all RHOAI component access through the shared
      ingress point. The GatewayConfig controller should detect the
      Route drift and reconcile the backend to the correct Gateway
      service.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - openshift-ingress
    allowDangerous: true
