apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: training-operator-webhook-disrupt
spec:
  tier: 4
  target:
    operator: training-operator
    component: kubeflow-training-operator
    resource: ValidatingWebhookConfiguration/kubeflow-validator.training-operator.kubeflow.org
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kubeflow-training-operator
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      webhookName: kubeflow-validator.training-operator.kubeflow.org
      webhookType: validating
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      When the training-operator validating webhook failurePolicy is weakened
      from Fail to Ignore, invalid training job resources may be admitted to
      the cluster. The chaos framework restores the original failurePolicy via
      TTL-based cleanup after 60s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
