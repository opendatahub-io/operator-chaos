apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-odh-model-controller-crd-mutation
spec:
  tier: 3
  target:
    operator: odh-model-controller
    component: odh-model-controller
    resource: ConfigMap/inferenceservice-config
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: odh-model-controller
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    # Target the inferenceservice-config ConfigMap which always exists when
    # odh-model-controller is deployed. We corrupt the data.ingress field
    # with invalid JSON to test how the controller handles config corruption.
    parameters:
      apiVersion: "v1"
      kind: "ConfigMap"
      name: "inferenceservice-config"
      path: "data.ingress"
      value: "corrupted-by-chaos"
    ttl: "300s"
  hypothesis:
    description: >-
      Mutating the inferenceservice-config ConfigMap's data.ingress field
      with a corrupted value tests whether the controller handles config
      corruption gracefully. The controller should detect the invalid
      config, log errors, and continue operating without crashing.
      The chaos framework restores the original value via TTL-based
      cleanup after 300s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
