apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-kserve-llm-controller-isolation
spec:
  tier: 2
  target:
    operator: kserve
    component: kserve-controller-manager
    resource: Deployment/kserve-controller-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kserve-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: NetworkPartition
    parameters:
      labelSelector: control-plane=kserve-controller-manager
    ttl: "60s"
  hypothesis:
    description: >-
      In RHOAI 3.3.2+, LLMInferenceService reconciliation is handled by
      the main kserve-controller-manager (not a separate deployment).
      When the controller is network-partitioned from the API server, it
      should lose its leader lease and stop reconciling both ISVC and
      LLM resources. Once the partition is lifted after 60s, the
      controller should re-acquire its lease and resume normal operation
      within 120s. Requires modelsAsService enabled in DSC and Red Hat
      Connectivity Link operator installed.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
