apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: rhoai-kserve-route-tls-mutation
spec:
  tier: 3
  target:
    operator: kserve
    component: kserve-controller-manager
    resource: Route/kserve-isvc-route
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: kserve-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    dangerLevel: high
    # NOTE: Replace "kserve-isvc-route" with the actual Route name for
    # your InferenceService.
    parameters:
      apiVersion: "route.openshift.io/v1"
      kind: "Route"
      name: "kserve-isvc-route"
      path: "spec.tls"
      value: '{"termination": "passthrough", "insecureEdgeTerminationPolicy": null}'
    ttl: "300s"
  hypothesis:
    description: >-
      Mutates the entire spec.tls block on a KServe InferenceService
      Route: changes termination to passthrough and removes
      insecureEdgeTerminationPolicy (which is only valid with edge
      termination). This breaks HTTPS inference endpoints. The KServe
      controller or RHOAI operator should detect the TLS drift and
      restore the correct termination mode. NOTE: The Route name must
      be customized per InferenceService deployment.
      Expected verdict: Resilient if restored, Vulnerable if broken.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - redhat-ods-applications
    allowDangerous: true
