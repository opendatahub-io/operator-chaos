apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: knative-webhook-label-stomping
spec:
  tier: 3
  target:
    operator: knative-serving
    component: webhook
    resource: Deployment/webhook
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: webhook
        namespace: knative-serving
        conditionType: Available
    timeout: "30s"
  injection:
    type: LabelStomping
    parameters:
      apiVersion: apps/v1
      kind: Deployment
      name: webhook
      labelKey: app
      action: overwrite
    ttl: "120s"
  hypothesis:
    description: >-
      Removing the app=webhook label disconnects pods from webhook Service
      endpoints, making the webhook unreachable for API server calls.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - knative-serving
