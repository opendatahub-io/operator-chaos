apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: knative-serving-controller-resource-deletion-service
spec:
  tier: 3
  target:
    operator: knative-serving
    component: controller
    resource: Deployment/controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: controller
        namespace: knative-serving
        conditionType: Available
    timeout: "30s"
  injection:
    type: ResourceDeletion
    dangerLevel: high
    parameters:
      apiVersion: v1
      kind: Service
      name: controller
    ttl: "300s"
  hypothesis:
    description: >-
      Deleting the metrics/webhook Service tests whether the operator
      recreates it during reconciliation. Without the Service,
      metrics scraping and webhook calls fail.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - knative-serving
