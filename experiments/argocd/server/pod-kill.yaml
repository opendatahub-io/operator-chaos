apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: argocd-server-pod-kill
spec:
  tier: 1
  target:
    operator: argocd
    component: server
    resource: Deployment/openshift-gitops-server
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: openshift-gitops-server
        namespace: openshift-gitops
        conditionType: Available
    timeout: "30s"
  injection:
    type: PodKill
    parameters:
      labelSelector: app.kubernetes.io/name=openshift-gitops-server
    count: 1
    ttl: "300s"
  hypothesis:
    description: >-
      Killing the ArgoCD API server pod should trigger a Deployment rollout
      that recreates it. During downtime, the ArgoCD UI and API are
      unavailable but existing GitOps syncs that are already running
      continue independently. New sync requests queue until recovery.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-gitops
