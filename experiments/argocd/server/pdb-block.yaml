apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: argocd-server-pdb-block
spec:
  tier: 2
  target:
    operator: argocd
    component: server
    resource: Deployment/openshift-gitops-server
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: openshift-gitops-server
        namespace: openshift-gitops
        conditionType: Available
    timeout: "30s"
  injection:
    type: PDBBlock
    dangerLevel: high
    parameters:
      labelSelector: app.kubernetes.io/name=openshift-gitops-server
    ttl: "10s"
  hypothesis:
    description: >-
      Creating a PDB with maxUnavailable=0 blocks all voluntary
      evictions. Tests whether the ArgoCD server pods can be drained
      for node maintenance or cluster upgrades.
    recoveryTimeout: 60s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-gitops
