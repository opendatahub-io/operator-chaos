apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: argocd-server-resource-deletion-service
spec:
  tier: 3
  target:
    operator: argocd
    component: server
    resource: Deployment/openshift-gitops-server
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: openshift-gitops-server
        namespace: openshift-gitops
        conditionType: Available
    timeout: "30s"
  injection:
    type: ResourceDeletion
    dangerLevel: high
    parameters:
      apiVersion: v1
      kind: Service
      name: openshift-gitops-server
    ttl: "300s"
  hypothesis:
    description: >-
      Deleting the ArgoCD server Service tests whether the GitOps
      operator recreates it during reconciliation. Without the Service,
      the ArgoCD UI Route becomes unroutable and API calls from the
      application controller and CLI clients fail.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-gitops
