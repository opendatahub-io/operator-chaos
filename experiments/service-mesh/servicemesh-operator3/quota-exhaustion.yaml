apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: servicemesh-operator3-quota-exhaustion
spec:
  tier: 3
  target:
    operator: service-mesh
    component: servicemesh-operator3
    resource: Deployment/servicemesh-operator3
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: servicemesh-operator3
        namespace: openshift-operators
        conditionType: Available
    timeout: "30s"
  injection:
    type: QuotaExhaustion
    parameters:
      quotaName: chaos-quota-servicemesh-operator3
      pods: "0"
      cpu: "0"
      memory: "0"
    ttl: "60s"
  hypothesis:
    description: >-
      A restrictive ResourceQuota prevents the operator from restarting
      after a failure. Existing pods continue running but new pods
      cannot be scheduled until the quota is removed.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-operators
