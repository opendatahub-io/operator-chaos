apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: istiod-crashloop-inject
spec:
  tier: 3
  target:
    operator: service-mesh
    component: istiod
    resource: Deployment/istiod-openshift-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: istiod-openshift-gateway
        namespace: openshift-ingress
        conditionType: Available
    timeout: "30s"
  injection:
    type: CrashLoopInject
    dangerLevel: high
    parameters:
      name: istiod-openshift-gateway
    ttl: "300s"
  hypothesis:
    description: >-
      Replacing the container command with a nonexistent binary causes
      CrashLoopBackOff. Tests whether the operator detects the degraded
      deployment and takes corrective action.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 2
    allowDangerous: true
    allowedNamespaces:
      - openshift-ingress
