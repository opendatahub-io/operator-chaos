apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: istiod-pod-kill
spec:
  tier: 1
  target:
    operator: service-mesh
    component: istiod
    resource: Deployment/istiod-openshift-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: istiod-openshift-gateway
        namespace: openshift-ingress
        conditionType: Available
    timeout: "30s"
  injection:
    type: PodKill
    parameters:
      labelSelector: app=istiod
    count: 1
    ttl: "120s"
  hypothesis:
    description: >-
      Killing the istiod control plane pod tests recovery of the Istio
      control plane. Existing data plane proxies should continue serving
      traffic with cached config, but new proxy connections and config
      pushes will fail until istiod recovers.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - openshift-ingress
