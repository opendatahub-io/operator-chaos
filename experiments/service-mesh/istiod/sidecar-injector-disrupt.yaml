apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: istiod-sidecar-injector-disrupt
spec:
  tier: 4
  target:
    operator: service-mesh
    component: istiod
    resource: MutatingWebhookConfiguration/istio-sidecar-injector-openshift-gateway-openshift-ingress
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: istiod-openshift-gateway
        namespace: openshift-ingress
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      webhookName: istio-sidecar-injector-openshift-gateway-openshift-ingress
      webhookType: mutating
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      Disrupting the sidecar injector mutating webhook tests whether
      istiod restores it. Without the injector, new pods in mesh-enabled
      namespaces will not get Envoy sidecars injected.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
