apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: istiod-rbac-revoke
spec:
  tier: 4
  target:
    operator: service-mesh
    component: istiod
    resource: Deployment/istiod-openshift-gateway
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: istiod-openshift-gateway
        namespace: openshift-ingress
        conditionType: Available
    timeout: "30s"
  injection:
    type: RBACRevoke
    dangerLevel: high
    parameters:
      bindingName: istiod-clusterrole-openshift-gateway-openshift-ingress
      bindingType: ClusterRoleBinding
    ttl: "60s"
  hypothesis:
    description: >-
      Revoking RBAC from istiod tests whether the Service Mesh operator
      restores the ClusterRoleBindings. Without API access, istiod cannot
      watch Services, Endpoints, or push config to proxies.
    recoveryTimeout: 180s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
