apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: kueue-localqueue-clusterqueue-unlink
spec:
  tier: 2
  target:
    operator: rh-kueue
    component: kueue-operand
    resource: LocalQueue/chaos-test-lq
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: openshift-kueue-operator
        namespace: openshift-kueue-operator
        conditionType: Available
    timeout: "30s"
  injection:
    type: CRDMutation
    parameters:
      apiVersion: "kueue.x-k8s.io/v1beta1"
      kind: "LocalQueue"
      name: "chaos-test-lq"
      namespace: "default"
      path: "spec.clusterQueue"
      value: "nonexistent-cq"
    ttl: "300s"
  hypothesis:
    description: >-
      Pointing a LocalQueue to a nonexistent ClusterQueue breaks the
      tenant-to-quota binding. Pending workloads should remain queued
      with appropriate error conditions. No workloads should be admitted
      to a nonexistent queue. After restoring the correct reference,
      pending workloads are admitted normally.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
