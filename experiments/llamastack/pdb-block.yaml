apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: llamastack-pdb-block
spec:
  tier: 2
  target:
    operator: llamastack
    component: llamastack-controller-manager
    resource: Deployment/llama-stack-k8s-operator-controller-manager
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: llama-stack-k8s-operator-controller-manager
        namespace: redhat-ods-applications
        conditionType: Available
    timeout: "30s"
  injection:
    type: PDBBlock
    dangerLevel: high
    parameters:
      labelSelector: app.kubernetes.io/name=llama-stack-k8s-operator
    ttl: "10s"
  hypothesis:
    description: >-
      Creating a PDB with maxUnavailable=0 blocks all voluntary
      evictions. Tests whether the operator's pods can be drained
      for node maintenance or cluster upgrades.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - redhat-ods-applications
