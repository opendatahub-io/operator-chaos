apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: llamastack-webhook-disrupt
spec:
  tier: 4
  target:
    operator: llamastack
    component: llamastack-controller-manager
    resource: ValidatingWebhookConfiguration/vllamastackdistribution.meta.com
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: llamastack-controller-manager
        namespace: opendatahub
        conditionType: Available
    timeout: "30s"
  injection:
    type: WebhookDisrupt
    dangerLevel: high
    parameters:
      webhookName: vllamastackdistribution.meta.com
      webhookType: validating
      action: setFailurePolicy
      value: Ignore
    ttl: "60s"
  hypothesis:
    description: >-
      When the LlamaStackDistribution validating webhook failurePolicy is
      weakened from Fail to Ignore, invalid LlamaStackDistribution resources
      may be admitted to the cluster. The chaos framework restores the
      original failurePolicy via TTL-based cleanup after 60s.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
