apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: spark-operator-controller-leader-election-disrupt
spec:
  tier: 3
  target:
    operator: spark-operator
    component: controller
    resource: Deployment/spark-operator-controller
  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: spark-operator-controller
        namespace: spark-operator
        conditionType: Available
    timeout: "30s"
  injection:
    type: LeaderElectionDisrupt
    dangerLevel: high
    parameters:
      name: spark-operator-controller-lock
    ttl: "120s"
  hypothesis:
    description: >-
      Disrupting the leader election lease forces a re-election cycle.
      Tests whether the controller detects the lost lease and re-acquires
      leadership, resuming SparkApplication reconciliation within the
      recovery timeout.
    recoveryTimeout: 120s
  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - spark-operator
